<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0f14;--bg2:#13161d;--bg3:#1a1e27;--bg4:#222733;--text:#e4e6ec;--text2:#9a9eb5;--text3:#5d6178;--gold:#d4a647;--gold-dim:rgba(212,166,71,.12);--gold-glow:rgba(212,166,71,.25);--green:#48c78e;--green-dim:rgba(72,199,142,.1);--red:#f25f5c;--red-dim:rgba(242,95,92,.1);--blue:#5b9cf4;--blue-dim:rgba(91,156,244,.1);--purple:#a87edb;--purple-dim:rgba(168,126,219,.1);--border:rgba(255,255,255,.05);--r:14px;--rs:10px}
html,body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;font-weight:400}
body{padding-bottom:84px}
h1,h2,h3,.serif{font-family:'Instrument Serif',serif;font-weight:400}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(12,15,20,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;transition:color .2s}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-add{position:relative;top:-12px}
.nav-add-circle{width:48px;height:48px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--gold-glow);transition:transform .15s}
.nav-add-circle:active{transform:scale(.92)}
.nav-add-circle svg{stroke:var(--bg);width:22px;height:22px}
.view{display:none;animation:fadeIn .25s ease}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hdr{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:1.45rem;letter-spacing:-.01em}
.mth{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 20px}
.mth button{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.mth-label{font-family:'Instrument Serif',serif;font-size:1.1rem;min-width:150px;text-align:center}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 14px}
.card{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:1px solid var(--border);overflow:hidden}
.card.full{grid-column:1/-1}
.card-lbl{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.card-val{font-family:'Instrument Serif',serif;font-size:1.55rem}
.card-sub{font-size:.7rem;color:var(--text3);margin-top:3px}
.card-val.pos{color:var(--green)}.card-val.neg{color:var(--red)}
.pbar{height:6px;background:var(--bg);border-radius:3px;margin-top:8px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s ease}
.sec{padding:0 20px;margin-bottom:18px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:.95rem;font-family:'Instrument Serif',serif}
.sec-badge{font-size:.68rem;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:6px}
.li{background:var(--bg2);border-radius:var(--rs);padding:13px 14px;margin-bottom:6px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.li:active{background:var(--bg3)}
.li.paid-item{opacity:.45}
.li-left{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.li-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.li-info{min-width:0}
.li-name{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-meta{font-size:.7rem;color:var(--text3);margin-top:1px}
.li-right{text-align:right;flex-shrink:0;margin-left:8px}
.li-amt{font-weight:600;font-size:.9rem}
.li-amt.exp{color:var(--red)}.li-amt.inc{color:var(--green)}
.bstat{font-size:.62rem;padding:2px 7px;border-radius:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:inline-block;margin-top:2px}
.bstat.paid{background:var(--green-dim);color:var(--green)}
.bstat.due{background:var(--red-dim);color:var(--red)}
.bstat.upcoming{background:var(--gold-dim);color:var(--gold)}
.goal{background:var(--bg2);border-radius:var(--r);padding:15px 16px;margin-bottom:10px;border:1px solid var(--border)}
.goal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.goal-name{font-weight:500;font-size:.88rem}
.goal-pct{font-size:.78rem;color:var(--gold);font-weight:600}
.goal-amts{font-size:.75rem;color:var(--text3);margin-bottom:8px}
.goal-amts span{color:var(--green);font-weight:600}
.goal-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.goal-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:3px;transition:width .6s ease}
.alloc{background:var(--bg2);border-radius:var(--r);padding:16px;margin:0 20px 14px;border:1px solid var(--border)}
.alloc-title{font-family:'Instrument Serif',serif;font-size:1rem;margin-bottom:12px}
.alloc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.alloc-row:last-child{border:none}
.alloc-left{display:flex;align-items:center;gap:8px}
.alloc-dot{width:8px;height:8px;border-radius:50%}
.alloc-cat{font-size:.82rem}
.alloc-val{font-size:.82rem;font-weight:600}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:22px 20px;padding-bottom:max(22px,calc(env(safe-area-inset-bottom)+14px));width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:36px;height:4px;background:var(--text3);border-radius:2px;margin:0 auto 18px}
.modal h2{font-size:1.15rem;margin-bottom:16px}
.fg{margin-bottom:14px}
.fl{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.fi{width:100%;padding:11px 13px;border-radius:var(--rs);background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:.95rem;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--gold)}.fi::placeholder{color:var(--text3)}
select.fi{appearance:none;cursor:pointer}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;border-radius:var(--rs);background:var(--gold);color:var(--bg);border:none;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;margin-top:6px;transition:opacity .2s}
.btn:active{opacity:.85}
.btn-del{background:var(--red-dim);color:var(--red);margin-top:8px}
.btn-sec{background:var(--bg3);color:var(--text2);margin-top:6px}
.tabs{display:flex;gap:7px;padding:0 20px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 13px;border-radius:18px;font-size:.74rem;font-weight:500;white-space:nowrap;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text3);transition:all .2s;font-family:'Outfit',sans-serif}
.tab.active{background:var(--gold-dim);color:var(--gold);border-color:rgba(212,166,71,.3)}
.sitem{display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--border);margin-bottom:7px;cursor:pointer}
.sitem:active{background:var(--bg3)}
.sitem-lbl{font-size:.88rem}.sitem-desc{font-size:.72rem;color:var(--text3);margin-top:2px}
.sitem-arrow{color:var(--text3);font-size:.9rem}
.accts{display:flex;gap:8px;padding:0 20px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.accts::-webkit-scrollbar{display:none}
.acct{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;min-width:140px;flex-shrink:0;cursor:pointer;transition:background .15s}
.acct:active{background:var(--bg3)}
.acct-name{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.acct-bal{font-family:'Instrument Serif',serif;font-size:1.2rem}
.acct-bal.pos{color:var(--green)}.acct-bal.neg{color:var(--red)}
.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty-icon{font-size:2rem;margin-bottom:10px}.empty p{font-size:.82rem;line-height:1.5}
.ci-housing{background:var(--blue-dim);color:var(--blue)}
.ci-food{background:var(--green-dim);color:var(--green)}
.ci-transport{background:var(--gold-dim);color:var(--gold)}
.ci-utilities{background:var(--purple-dim);color:var(--purple)}
.ci-insurance{background:rgba(91,156,244,.1);color:#5b9cf4}
.ci-subscriptions{background:rgba(242,95,92,.08);color:#f25f5c}
.ci-childcare{background:rgba(72,199,142,.1);color:#48c78e}
.ci-loan{background:rgba(242,166,71,.1);color:#d4a647}
.ci-savings{background:var(--green-dim);color:var(--green)}
.ci-income{background:var(--green-dim);color:var(--green)}
.ci-work{background:rgba(168,126,219,.1);color:#a87edb}
.ci-other{background:rgba(255,255,255,.05);color:var(--text3)}
.ci-oneoff{background:var(--red-dim);color:var(--red)}
.pay-section{background:var(--bg2);border-radius:var(--r);padding:16px;margin:0 20px 12px;border:1px solid var(--border)}
.pay-section-title{font-family:'Instrument Serif',serif;font-size:1rem;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:.84rem}
.pay-row:last-child{border:none}
.pay-row-name{color:var(--text2)}.pay-row-val{font-weight:600}
.pay-row-val.out{color:var(--red)}.pay-row-val.in{color:var(--green)}
.pay-transfer{background:var(--gold-dim);border:1px solid rgba(212,166,71,.2);border-radius:var(--rs);padding:14px 16px;margin:0 20px 10px;display:flex;align-items:center;gap:12px}
.pay-transfer-text{font-size:.84rem;flex:1}
.pay-transfer-text strong{color:var(--gold);font-weight:600}
.pay-transfer-amt{font-family:'Instrument Serif',serif;font-size:1.15rem;color:var(--gold);font-weight:400;white-space:nowrap}
.pay-check{width:24px;height:24px;border-radius:7px;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.pay-check.done{background:var(--green);border-color:var(--green);color:var(--bg)}
.pay-check svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 20px;font-size:.84rem;z-index:300;transition:transform .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.green{border-color:rgba(72,199,142,.3);color:var(--green)}
.toast.red{border-color:rgba(242,95,92,.3);color:var(--red)}
</style>
</head>

function fmt(n){return'€'+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function fmtS(n){return'€'+Math.abs(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function ordinal(n){const s=['th','st','nd','rd'];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
function getAcct(id){return data.accounts.find(a=>a.id===id)}
function acctName(id){return ACCT_MAP[id]||id}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'green');setTimeout(()=>t.classList.remove('show'),2400)}

function billsForMonth(m,y){
  const bills=[];
  BILLS_TEMPLATE.forEach(b=>{if(b.freq==='monthly')bills.push({...b});else if(b.freq==='bimonthly'&&b.biMonths&&b.biMonths.includes(m))bills.push({...b})});
  if(m===3&&y===2026)ONEOFFS_APR.forEach(o=>bills.push({...o,freq:'oneoff'}));
  if(m===3&&y>2026)bills.push({name:'Property Tax',amount:270,day:0,cat:'oneoff',acctId:'',freq:'oneoff'});
  data.customBills.forEach(cb=>{if(cb.month===mk(m,y)||cb.freq==='monthly')bills.push({...cb})});
  return bills;
}
function isBillPaid(name,m,y){return!!data.billsPaid[mk(m,y)+'|'+name]}
function toggleBillPaid(name,m,y){
  const k=mk(m,y)+'|'+name;const wasPaid=data.billsPaid[k];
  const bill=billsForMonth(m,y).find(b=>b.name===name);
  if(!wasPaid&&bill&&bill.acctId){const acct=getAcct(bill.acctId);if(acct){acct.bal-=bill.amount;toast(fmt(bill.amount)+' from '+acct.name,'green')}}
  else if(wasPaid&&bill&&bill.acctId){const acct=getAcct(bill.acctId);if(acct){acct.bal+=bill.amount;toast(fmt(bill.amount)+' back to '+acct.name,'red')}}
  data.billsPaid[k]=!wasPaid;save();render();
}
function monthTotals(m,y){
  const bills=billsForMonth(m,y);const te=bills.reduce((s,b)=>s+b.amount,0);const ti=INCOME.reduce((s,i)=>s+i.amount,0);
  const byCat={};bills.forEach(b=>{const c=b.cat||'other';byCat[c]=(byCat[c]||0)+b.amount});
  const txns=data.transactions.filter(t=>t.date&&t.date.startsWith(mk(m,y)));
  return{totalExpenses:te,totalIncome:ti,surplus:ti-te,byCat,bills,txns};
}

function go(v){document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));document.getElementById('v-'+v).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));render()}
function chMo(d){cm+=d;if(cm>11){cm=0;cy++}if(cm<0){cm=11;cy--}render()}
function render(){renderDash();renderBills();renderPayday();renderGoals();renderSettings()}

function renderDash(){
  const t=monthTotals(cm,cy),moLabel=MO[cm]+' '+cy,pct=t.totalIncome>0?Math.min((t.totalExpenses/t.totalIncome)*100,100):0;
  const sa=data.surplus,alloc=(sa.extraCUSavings||0)+(sa.gifts||0)+(sa.ianPersonal||0)+(sa.rebPersonal||0)+(sa.loanOverpay||0);
  let h=`<div class="hdr"><h1>Family Budget</h1><button class="nav-btn" onclick="go('settings')" style="padding:4px 8px;font-size:.65rem;color:var(--text3)">⚙️</button></div>
  <div class="mth"><button onclick="chMo(-1)">‹</button><div class="mth-label">${moLabel}</div><button onclick="chMo(1)">›</button></div>
  <div class="accts">${data.accounts.map(a=>`<div class="acct" onclick="openEditOneAcct('${a.id}')"><div class="acct-name">${a.name}${a.note?' · '+a.note:''}</div><div class="acct-bal ${a.bal>=0?'pos':'neg'}">${a.bal>=0?'':'-'}${fmt(a.bal)}</div></div>`).join('')}</div>
  <div class="cards">
    <div class="card"><div class="card-lbl">Income</div><div class="card-val pos">${fmtS(t.totalIncome)}</div><div class="card-sub">Combined monthly</div></div>
    <div class="card"><div class="card-lbl">Expenses</div><div class="card-val neg">${fmtS(t.totalExpenses)}</div><div class="card-sub">${Object.keys(t.byCat).length} categories</div></div>
    <div class="card full"><div class="card-lbl">Remaining</div><div class="card-val ${t.surplus>=0?'pos':'neg'}">${t.surplus>=0?'':'-'}${fmt(t.surplus)}</div>
      <div class="pbar"><div class="pfill" style="width:${pct}%;background:${pct>100?'var(--red)':pct>85?'var(--gold)':'var(--green)'}"></div></div>
      <div class="card-sub">${pct.toFixed(0)}% of income allocated</div></div></div>`;
  const cats=Object.entries(t.byCat).sort((a,b)=>b[1]-a[1]);
  if(cats.length){h+=`<div class="sec"><div class="sec-hdr"><div class="sec-title">Spending Breakdown</div></div>`;
    cats.forEach(([c,amt])=>{const cat=CATS[c]||CATS.other;const p=t.totalExpenses>0?(amt/t.totalExpenses*100):0;
      h+=`<div class="li" style="cursor:default"><div class="li-left"><div class="li-icon ci-${c}">${cat.icon}</div><div class="li-info"><div class="li-name">${cat.label}</div><div class="li-meta">${p.toFixed(1)}%</div></div></div><div class="li-right"><div class="li-amt exp">${fmt(amt)}</div></div></div>`});h+=`</div>`}
  if(t.surplus>0&&!(cm===3&&cy===2026)){
    h+=`<div class="alloc"><div class="alloc-title">Monthly Surplus Plan · ${fmt(t.surplus)}</div>
    <div class="alloc-row"><div class="alloc-left"><div class="alloc-dot" style="background:var(--green)"></div><div class="alloc-cat">Extra CU Savings</div></div><div class="alloc-val">${fmt(sa.extraCUSavings||0)}</div></div>
    <div class="alloc-row"><div class="alloc-left"><div class="alloc-dot" style="background:var(--gold)"></div><div class="alloc-cat">Loan Overpay</div></div><div class="alloc-val">${fmt(sa.loanOverpay||0)}</div></div>
    <div class="alloc-row"><div class="alloc-left"><div class="alloc-dot" style="background:var(--purple)"></div><div class="alloc-cat">Gifts & Birthdays</div></div><div class="alloc-val">${fmt(sa.gifts||0)}</div></div>
    <div class="alloc-row"><div class="alloc-left"><div class="alloc-dot" style="background:var(--blue)"></div><div class="alloc-cat">Ian — Personal</div></div><div class="alloc-val">${fmt(sa.ianPersonal||0)}</div></div>
    <div class="alloc-row"><div class="alloc-left"><div class="alloc-dot" style="background:#e84878"></div><div class="alloc-cat">Rebecca — Personal</div></div><div class="alloc-val">${fmt(sa.rebPersonal||0)}</div></div>
    <div class="alloc-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:10px"><div class="alloc-left"><div class="alloc-cat" style="font-weight:600">Unallocated</div></div><div class="alloc-val" style="color:${t.surplus-alloc>=0?'var(--green)':'var(--red)'}">${fmt(t.surplus-alloc)}</div></div>
    <button class="btn" style="margin-top:12px;font-size:.82rem;padding:10px" onclick="openAllocModal()">Edit Allocation</button></div>`}
  if(t.txns.length){h+=`<div class="sec"><div class="sec-hdr"><div class="sec-title">Manual Transactions</div></div>`;
    t.txns.sort((a,b)=>b.date.localeCompare(a.date)).forEach(tx=>{const cat=CATS[tx.cat]||CATS.other;
      h+=`<div class="li" onclick="editTxn('${tx.id}')"><div class="li-left"><div class="li-icon ci-${tx.cat||'other'}">${cat.icon}</div><div class="li-info"><div class="li-name">${tx.name}</div><div class="li-meta">${tx.date}</div></div></div><div class="li-right"><div class="li-amt ${tx.type==='income'?'inc':'exp'}">${tx.type==='income'?'+':'−'}${fmt(tx.amount)}</div></div></div>`});h+=`</div>`}
  document.getElementById('v-dash').innerHTML=h;
}

function renderBills(){
  const bills=billsForMonth(cm,cy),moLabel=MO[cm]+' '+cy,today=new Date(),td=today.getDate(),isCur=cm===today.getMonth()&&cy===today.getFullYear();
  bills.sort((a,b)=>{const ap=isBillPaid(a.name,cm,cy)?1:0,bp=isBillPaid(b.name,cm,cy)?1:0;if(ap!==bp)return ap-bp;return(a.day||31)-(b.day||31)});
  const totalDue=bills.reduce((s,b)=>s+b.amount,0),totalPaid=bills.filter(b=>isBillPaid(b.name,cm,cy)).reduce((s,b)=>s+b.amount,0);
  let h=`<div class="hdr"><h1>Bills & Due Dates</h1></div>
  <div class="mth"><button onclick="chMo(-1)">‹</button><div class="mth-label">${moLabel}</div><button onclick="chMo(1)">›</button></div>
  <div class="cards" style="margin-bottom:4px"><div class="card"><div class="card-lbl">Total Due</div><div class="card-val">${fmtS(totalDue)}</div></div>
  <div class="card"><div class="card-lbl">Paid</div><div class="card-val pos">${fmtS(totalPaid)}</div><div class="pbar"><div class="pfill" style="width:${totalDue>0?(totalPaid/totalDue*100):0}%;background:var(--green)"></div></div></div></div><div class="sec">`;
  if(!bills.length)h+=`<div class="empty"><div class="empty-icon">📅</div><p>No bills this month</p></div>`;
  else bills.forEach(b=>{const paid=isBillPaid(b.name,cm,cy),cat=CATS[b.cat]||CATS.other,dayStr=b.day?ordinal(b.day):(b.variable?'Variable':'—');
    let status='upcoming';if(paid)status='paid';else if(isCur&&b.day&&b.day<=td)status='due';
    const esc=b.name.replace(/'/g,"\\'");
    h+=`<div class="li ${paid?'paid-item':''}" onclick="toggleBillPaid('${esc}',${cm},${cy})"><div class="li-left"><div class="li-icon ci-${b.cat||'other'}">${cat.icon}</div><div class="li-info"><div class="li-name">${b.name}</div><div class="li-meta">${dayStr}${b.acctId?' · '+acctName(b.acctId):''}${b.note?' · '+b.note:''}</div></div></div><div class="li-right"><div class="li-amt exp">${fmt(b.amount)}</div><div class="bstat ${status}">${status}</div></div></div>`});
  h+=`</div>`;document.getElementById('v-bills').innerHTML=h;
}

function renderPayday(){
  const moLabel=MO[cm]+' '+cy,bills=billsForMonth(cm,cy);
  const byAcct={};bills.forEach(b=>{if(!b.acctId)return;if(!byAcct[b.acctId])byAcct[b.acctId]={bills:[],total:0};byAcct[b.acctId].bills.push(b);byAcct[b.acctId].total+=b.amount});
  const ga=id=>(byAcct[id]||{bills:[],total:0});
  const ianAib=ga('ian-aib'),ianRev=ga('ian-rev'),ianCc=ga('ian-cc');
  const rebAib=ga('reb-aib'),rebRev=ga('reb-rev'),rebCc=ga('reb-cc');
  const joint=ga('joint-rev'),jointEach=Math.ceil(joint.total/2);
  const ianLeft=3100-ianAib.total,rebLeft=2571-rebAib.total;

  function section(title,emoji,acctBills){
    let s=`<div class="pay-section"><div class="pay-section-title"><span>${emoji}</span> ${title}</div>`;
    acctBills.bills.sort((a,b)=>(a.day||31)-(b.day||31)).forEach(b=>{s+=`<div class="pay-row"><div class="pay-row-name">${b.name}${b.day?' · '+ordinal(b.day):''}</div><div class="pay-row-val out">−${fmt(b.amount)}</div></div>`});
    return s;
  }
  function transfer(key,label,desc,amt){
    const k=mk(cm,cy)+'|'+key,done=!!data.paydayChecks[k];
    return`<div class="pay-transfer"><div class="pay-check ${done?'done':''}" onclick="togglePayCheck('${key}')">${done?'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':''}</div><div class="pay-transfer-text">Transfer to <strong>${label}</strong><br><span style="font-size:.72rem;color:var(--text3)">${desc}</span></div><div class="pay-transfer-amt">${fmt(amt)}</div></div>`;
  }

  let h=`<div class="hdr"><h1>Payday Checklist</h1></div>
  <div class="mth"><button onclick="chMo(-1)">‹</button><div class="mth-label">${moLabel}</div><button onclick="chMo(1)">›</button></div>`;

  // IAN
  h+=`<div style="padding:0 20px 8px"><div class="sec-title">💰 Ian's Payday · ~7th</div><div style="font-size:.72rem;color:var(--text3);margin-top:2px">Salary of ${fmt(3100)} lands in Ian's AIB</div></div>`;
  h+=section("Ian's AIB — Direct Debits",'🏦',ianAib);
  h+=`<div class="pay-row" style="border:none;padding-top:6px"><div class="pay-row-name" style="font-weight:600;color:var(--text)">Left in AIB after DDs</div><div class="pay-row-val" style="color:${ianLeft>=0?'var(--green)':'var(--red)'}">${fmt(ianLeft)}</div></div></div>`;
  if(ianRev.total>0)h+=transfer('ian-rev',"Ian's Revolut",'Subscriptions & phones',ianRev.total);
  if(ianCc.total>0)h+=transfer('ian-cc',"Ian's Credit Card",'Work lunch, printer'+(bills.find(b=>b.name==='Coffee Pods')?', coffee pods':''),ianCc.total);
  h+=transfer('ian-joint','Joint Revolut',"Ian's half — groceries, petrol, takeout",jointEach);

  // REBECCA
  h+=`<div style="padding:14px 20px 8px"><div class="sec-title">💰 Rebecca's Payday · ~27th</div><div style="font-size:.72rem;color:var(--text3);margin-top:2px">Salary of ${fmt(2571)} lands in Rebecca's AIB</div></div>`;
  h+=section("Rebecca's AIB — Direct Debits",'🏦',rebAib);
  h+=`<div class="pay-row" style="border:none;padding-top:6px"><div class="pay-row-name" style="font-weight:600;color:var(--text)">Left in AIB after DDs</div><div class="pay-row-val" style="color:${rebLeft>=0?'var(--green)':'var(--red)'}">${fmt(rebLeft)}</div></div></div>`;
  if(rebRev.total>0)h+=transfer('reb-rev',"Rebecca's Revolut",'Insurance, WiFi, subs, cleaning',rebRev.total);
  if(rebCc.total>0)h+=transfer('reb-cc',"Rebecca's Credit Card",'Work lunch & parking',rebCc.total);
  h+=transfer('reb-joint','Joint Revolut',"Rebecca's half — groceries, petrol, takeout",jointEach);

  // SUMMARY
  const totalLeft=(ianLeft-ianRev.total-ianCc.total-jointEach)+(rebLeft-rebRev.total-rebCc.total-jointEach);
  h+=`<div class="pay-section" style="margin-top:14px"><div class="pay-section-title"><span>📊</span> Month Summary</div>
  <div class="pay-row"><div class="pay-row-name">Total income</div><div class="pay-row-val in">${fmt(5671)}</div></div>
  <div class="pay-row"><div class="pay-row-name">Total bills & expenses</div><div class="pay-row-val out">−${fmt(monthTotals(cm,cy).totalExpenses)}</div></div>
  <div class="pay-row"><div class="pay-row-name">Ian remaining after transfers</div><div class="pay-row-val">${fmt(ianLeft-ianRev.total-ianCc.total-jointEach)}</div></div>
  <div class="pay-row"><div class="pay-row-name">Rebecca remaining after transfers</div><div class="pay-row-val">${fmt(rebLeft-rebRev.total-rebCc.total-jointEach)}</div></div>
  <div class="pay-row" style="border:none;padding-top:6px"><div class="pay-row-name" style="font-weight:600;color:var(--text)">Combined surplus</div><div class="pay-row-val" style="color:${totalLeft>=0?'var(--green)':'var(--red)'}">${totalLeft>=0?'':'-'}${fmt(totalLeft)}</div></div></div>`;
  document.getElementById('v-pay').innerHTML=h;
}
function togglePayCheck(key){const k=mk(cm,cy)+'|'+key;data.paydayChecks[k]=!data.paydayChecks[k];save();render()}

function renderGoals(){
  let h=`<div class="hdr"><h1>Savings & Debt</h1></div><div class="sec" style="padding-top:16px">
  <div class="sec-hdr"><div class="sec-title">Loans to Clear</div><div class="sec-badge">${fmt(2969.71+11439.14)} total</div></div>`;
  [{name:'Boiler Loan',total:2969.71,payment:140,icon:'🔥'},{name:'Car Loan',total:11439.14,payment:235,icon:'🚗'}].forEach(l=>{
    const ml=Math.ceil(l.total/l.payment);h+=`<div class="goal"><div class="goal-top"><div class="goal-name">${l.icon} ${l.name}</div><div class="goal-pct">${ml} mo left</div></div><div class="goal-amts">${fmt(l.total)} remaining · ${fmt(l.payment)}/month</div><div class="goal-bar"><div class="goal-fill" style="width:${Math.max(5,100-((l.total/(l.total+2000))*100))}%"></div></div></div>`});
  h+=`<div class="sec-hdr" style="margin-top:20px"><div class="sec-title">Savings Goals</div></div>`;
  data.goals.forEach(g=>{const pct=g.target>0?(g.saved/g.target*100):0;
    h+=`<div class="goal" onclick="editGoal('${g.id}')"><div class="goal-top"><div class="goal-name">${g.icon||'🎯'} ${g.name}</div><div class="goal-pct">${pct.toFixed(0)}%</div></div><div class="goal-amts"><span>${fmt(g.saved)}</span> of ${fmt(g.target)}${g.note?' · '+g.note:''}</div><div class="goal-bar"><div class="goal-fill" style="width:${Math.min(pct,100)}%"></div></div></div>`});
  h+=`<button class="btn" style="margin-top:10px;font-size:.82rem;padding:10px;background:var(--bg3);color:var(--gold);border:1px solid rgba(212,166,71,.2)" onclick="openAddGoal()">+ Add Goal</button></div>`;
  document.getElementById('v-goals').innerHTML=h;
}

function closeModals(){document.getElementById('modal-add').classList.remove('open');document.getElementById('modal-edit').classList.remove('open')}
function openAdd(){addType='expense';renderAddModal();document.getElementById('modal-add').classList.add('open')}
function setAddType(t){addType=t;renderAddModal()}
function renderAddModal(){
  let h=`<div class="modal-handle"></div><h2>Add Transaction</h2>
  <div class="tabs" style="padding:0 0 14px">${['expense','income'].map(t=>`<div class="tab ${addType===t?'active':''}" onclick="setAddType('${t}')">${t[0].toUpperCase()+t.slice(1)}</div>`).join('')}</div>
  <div class="fg"><label class="fl">Name</label><input class="fi" id="add-name" placeholder="e.g. Birthday present"></div>
  <div class="frow"><div class="fg"><label class="fl">Amount (€)</label><input class="fi" id="add-amt" type="number" step="0.01" placeholder="0.00"></div>
  <div class="fg"><label class="fl">Date</label><input class="fi" id="add-date" type="date" value="${cy}-${String(cm+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}"></div></div>
  <div class="fg"><label class="fl">Category</label><select class="fi" id="add-cat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v.icon} ${v.label}</option>`).join('')}</select></div>
  <div class="fg"><label class="fl">Account (adjusts balance)</label><select class="fi" id="add-acct"><option value="">— None —</option>${data.accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
  <div class="fg"><label class="fl">Note (optional)</label><input class="fi" id="add-note" placeholder="Any details"></div>
  <button class="btn" onclick="saveAdd()">Save</button><button class="btn btn-del" onclick="closeModals()">Cancel</button>`;
  document.getElementById('modal-add-inner').innerHTML=h;
}
function saveAdd(){
  const name=document.getElementById('add-name').value.trim(),amt=parseFloat(document.getElementById('add-amt').value),date=document.getElementById('add-date').value,cat=document.getElementById('add-cat').value,acctId=document.getElementById('add-acct').value,note=document.getElementById('add-note').value.trim();
  if(!name||!amt||!date)return alert('Please fill in name, amount and date.');
  data.transactions.push({id:uid(),name,amount:amt,date,cat,note,type:addType,acctId});
  if(acctId){const acct=getAcct(acctId);if(acct){if(addType==='expense'){acct.bal-=amt;toast(fmt(amt)+' from '+acct.name)}else{acct.bal+=amt;toast(fmt(amt)+' to '+acct.name)}}}
  save();closeModals();render();
}
function editTxn(id){const tx=data.transactions.find(t=>t.id===id);if(!tx)return;
  let h=`<div class="modal-handle"></div><h2>Edit Transaction</h2>
  <div class="fg"><label class="fl">Name</label><input class="fi" id="ed-name" value="${tx.name}"></div>
  <div class="frow"><div class="fg"><label class="fl">Amount (€)</label><input class="fi" id="ed-amt" type="number" step="0.01" value="${tx.amount}"></div>
  <div class="fg"><label class="fl">Date</label><input class="fi" id="ed-date" type="date" value="${tx.date}"></div></div>
  <div class="fg"><label class="fl">Category</label><select class="fi" id="ed-cat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${tx.cat===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}</select></div>
  <button class="btn" onclick="saveTxnEdit('${id}')">Save</button><button class="btn btn-del" onclick="delTxn('${id}')">Delete</button><button class="btn btn-sec" onclick="closeModals()">Cancel</button>`;
  document.getElementById('modal-edit-inner').innerHTML=h;document.getElementById('modal-edit').classList.add('open')}
function saveTxnEdit(id){const tx=data.transactions.find(t=>t.id===id);if(!tx)return;tx.name=document.getElementById('ed-name').value.trim();tx.amount=parseFloat(document.getElementById('ed-amt').value);tx.date=document.getElementById('ed-date').value;tx.cat=document.getElementById('ed-cat').value;save();closeModals();render()}
function delTxn(id){data.transactions=data.transactions.filter(t=>t.id!==id);save();closeModals();render()}

function openEditOneAcct(id){const a=getAcct(id);if(!a)return;
  let h=`<div class="modal-handle"></div><h2>${a.name}</h2>
  <div class="fg"><label class="fl">Current Balance (€)</label><input class="fi" id="ea-bal" type="number" step="0.01" value="${a.bal}"></div>
  <button class="btn" onclick="saveOneAcct('${id}')">Update Balance</button><button class="btn btn-sec" onclick="closeModals()">Cancel</button>`;
  document.getElementById('modal-edit-inner').innerHTML=h;document.getElementById('modal-edit').classList.add('open')}
function saveOneAcct(id){const a=getAcct(id);if(!a)return;a.bal=parseFloat(document.getElementById('ea-bal').value)||0;save();closeModals();toast(a.name+' updated');render()}

function openEditAccounts(){let h=`<div class="modal-handle"></div><h2>Account Balances</h2>`;
  data.accounts.forEach((a,i)=>{h+=`<div class="fg"><label class="fl">${a.name}${a.note?' ('+a.note+')':''}</label><input class="fi" id="acct-${i}" type="number" step="0.01" value="${a.bal}"></div>`});
  h+=`<button class="btn" onclick="saveAccounts()">Save All</button><button class="btn btn-sec" onclick="closeModals()">Cancel</button>`;
  document.getElementById('modal-edit-inner').innerHTML=h;document.getElementById('modal-edit').classList.add('open')}
function saveAccounts(){data.accounts.forEach((a,i)=>{a.bal=parseFloat(document.getElementById('acct-'+i).value)||0});save();closeModals();toast('All balances updated');render()}

function editGoal(id){const g=data.goals.find(x=>x.id===id);if(!g)return;
  let h=`<div class="modal-handle"></div><h2>Edit Goal</h2>
  <div class="fg"><label class="fl">Name</label><input class="fi" id="eg-name" value="${g.name}"></div>
  <div class="frow"><div class="fg"><label class="fl">Target (€)</label><input class="fi" id="eg-target" type="number" step="0.01" value="${g.target}"></div>
  <div class="fg"><label class="fl">Saved (€)</label><input class="fi" id="eg-saved" type="number" step="0.01" value="${g.saved}"></div></div>
  <div class="fg"><label class="fl">Note</label><input class="fi" id="eg-note" value="${g.note||''}"></div>
  <button class="btn" onclick="saveGoalEdit('${id}')">Save</button><button class="btn btn-del" onclick="delGoal('${id}')">Delete</button><button class="btn btn-sec" onclick="closeModals()">Cancel</button>`;
  document.getElementById('modal-edit-inner').innerHTML=h;document.getElementById('modal-edit').classList.add('open')}
function saveGoalEdit(id){const g=data.goals.find(x=>x.id===id);if(!g)return;g.name=document.getElementById('eg-name').value.trim();g.target=parseFloat(document.getElementById('eg-target').value);g.saved=parseFloat(document.getElementById('eg-saved').value);g.note=document.getElementById('eg-note').value.trim();save();closeModals();render()}
function delGoal(id){data.goals=data.goals.filter(x=>x.id!==id);save();closeModals();render()}
function openAddGoal(){let h=`<div class="modal-handle"></div><h2>New Savings Goal</h2>
  <div class="fg"><label class="fl">Name</label><input class="fi" id="ng-name" placeholder="e.g. Emergency Fund"></div>
  <div class="frow"><div class="fg"><label class="fl">Target (€)</label><input class="fi" id="ng-target" type="number" step="0.01" placeholder="0"></div>
  <div class="fg"><label class="fl">Saved (€)</label><input class="fi" id="ng-saved" type="number" step="0.01" value="0"></div></div>
  <button class="btn" onclick="saveNewGoal()">Add Goal</button><button class="btn btn-sec" onclick="closeModals()">Cancel</button>`;
  document.getElementById('modal-edit-inner').innerHTML=h;document.getElementById('modal-edit').classList.add('open')}
function saveNewGoal(){const name=document.getElementById('ng-name').value.trim(),target=parseFloat(document.getElementById('ng-target').value)||0,saved=parseFloat(document.getElementById('ng-saved').value)||0;
  if(!name)return alert('Please enter a name.');data.goals.push({id:uid(),name,target,saved,icon:'🎯',note:''});save();closeModals();render()}

function openAllocModal(){const sa=data.surplus;
  let h=`<div class="modal-handle"></div><h2>Edit Monthly Surplus</h2><p style="font-size:.78rem;color:var(--text3);margin-bottom:14px">Split the leftover money each month.</p>
  <div class="fg"><label class="fl">Extra CU Savings (€)</label><input class="fi" id="al-cu" type="number" value="${sa.extraCUSavings||0}"></div>
  <div class="fg"><label class="fl">Loan Overpayment (€)</label><input class="fi" id="al-loan" type="number" value="${sa.loanOverpay||0}"></div>
  <div class="fg"><label class="fl">Gifts & Birthdays (€)</label><input class="fi" id="al-gifts" type="number" value="${sa.gifts||0}"></div>
  <div class="fg"><label class="fl">Ian — Personal (€)</label><input class="fi" id="al-ian" type="number" value="${sa.ianPersonal||0}"></div>
  <div class="fg"><label class="fl">Rebecca — Personal (€)</label><input class="fi" id="al-reb" type="number" value="${sa.rebPersonal||0}"></div>
  <button class="btn" onclick="saveAlloc()">Save</button><button class="btn btn-sec" onclick="closeModals()">Cancel</button>`;
  document.getElementById('modal-edit-inner').innerHTML=h;document.getElementById('modal-edit').classList.add('open')}
function saveAlloc(){data.surplus.extraCUSavings=parseFloat(document.getElementById('al-cu').value)||0;data.surplus.loanOverpay=parseFloat(document.getElementById('al-loan').value)||0;data.surplus.gifts=parseFloat(document.getElementById('al-gifts').value)||0;data.surplus.ianPersonal=parseFloat(document.getElementById('al-ian').value)||0;data.surplus.rebPersonal=parseFloat(document.getElementById('al-reb').value)||0;save();closeModals();render()}

function exportData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='family-budget-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url)}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{data=JSON.parse(ev.target.result);save();render();toast('Data imported!')}catch(err){alert('Error: '+err.message)}};reader.readAsText(file);e.target.value=''}
function resetData(){if(!confirm('Delete all data and start fresh?'))return;if(!confirm('Really sure?'))return;localStorage.removeItem('fbudget');data=getDefault();save();render();toast('Data reset','red')}

render();
</script>
</body>
</html>
